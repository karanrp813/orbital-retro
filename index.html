<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ORBITAL RETRO // NEO TRACKING</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/theme-a.css">
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="scene-container"></div>

<div class="hud flicker">
  <header class="hud-panel scanline hud-header">
    <h1>ORBITAL RETRO</h1>
    <div id="status-line" class="small"></div>
    <div id="sync-line" class="small dim"></div>
    <nav class="mode-tabs">
      <button id="tab-neo" class="tab active" type="button">NEO TRACK</button>
      <button id="tab-system" class="tab" type="button" disabled>SYSTEM MAP</button>
      <button id="tab-launches" class="tab" type="button">LAUNCH DIR</button>
      <button id="tab-archive" class="tab" type="button">ARCHIVE</button>
      <button id="tab-sound" class="tab" type="button">SND ON</button>
    </nav>
  </header>

  <aside id="target-panel" class="hud-panel scanline hidden">
    <div class="panel-title" id="panel-title">// TARGET LOCK</div>
    <div id="panel-rows"></div>
  </aside>

  <aside id="radar-panel" class="hud-panel scanline">
    <div class="panel-title">// TACTICAL SCOPE</div>
    <canvas id="radar-canvas"></canvas>
    <div class="small dim">RANGE: LUNAR DIST / LOG SCALE</div>
  </aside>

  <footer class="hud-panel scanline hud-footer">
    <div id="footer-line" class="small"></div>
  </footer>
</div>

<div id="label-layer" aria-hidden="true"></div>

<div id="lock-brackets" class="hidden">
  <span class="br br-tl"></span><span class="br br-tr"></span>
  <span class="br br-bl"></span><span class="br br-br"></span>
</div>

<div id="small-screen">
  <h2>TERMINAL WIDTH INSUFFICIENT</h2>
  <p>ORBITAL RETRO REQUIRES A DESKTOP-CLASS DISPLAY<br>MINIMUM VIEWPORT 760 PX</p>
  <p class="dim">ROTATE DEVICE OR RELOCATE TO COMMAND DECK<span class="cursor">_</span></p>
</div>

<div class="crt scanline" aria-hidden="true"></div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
