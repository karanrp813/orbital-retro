name: Refresh data and deploy to Pages

on:
  push:
    branches: [master]
  schedule:
    # Daily refresh; keeps the public dashboard self-updating.
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      # Any ingestor failure fails the run and keeps the last good deploy live.
      - name: Run data pipeline
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: |
          python pipeline/refresh_all.py && rc=0 || rc=$?
          cat data/refresh.log
          exit $rc

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
